<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance Practice Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --surface: #141420;
            --surface-2: #1c1c2e;
            --border: #2a2a40;
            --text: #e8e8f0;
            --text-dim: #8888a0;
            --accent: #c8a2ff;
            --accent-glow: rgba(200, 162, 255, 0.15);
            --pink: #ff6b9d;
            --teal: #4ecdc4;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--pink));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .logo-text {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -0.02em;
        }

        .logo-text span {
            color: var(--accent);
        }

        .header-hint {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-family: 'Space Mono', monospace;
        }

        /* Main Layout */
        .main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Video Area */
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/9;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .video-wrapper.mirrored video {
            transform: scaleX(-1);
        }

        /* Upload Placeholder */
        .upload-zone {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            background: var(--surface);
            cursor: pointer;
            transition: background 0.3s;
        }

        .upload-zone:hover {
            background: var(--surface-2);
        }

        .upload-zone.hidden { display: none; }

        .upload-icon {
            width: 72px;
            height: 72px;
            border: 2px dashed var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--accent);
            transition: border-color 0.3s, transform 0.3s;
        }

        .upload-zone:hover .upload-icon {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .upload-text {
            font-size: 1rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        .upload-text strong {
            color: var(--accent);
        }

        .upload-sub {
            font-size: 0.75rem;
            color: var(--text-dim);
            opacity: 0.6;
        }

        input[type="file"] { display: none; }

        /* Video Overlay (play indicator) */
        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .play-overlay.show {
            opacity: 1;
        }

        .play-overlay-icon {
            width: 64px;
            height: 64px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .play-overlay-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        /* Fullscreen button overlay */
        .fullscreen-btn-overlay {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.5);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            transition: background 0.2s;
            z-index: 5;
        }

        .fullscreen-btn-overlay:hover {
            background: rgba(0,0,0,0.7);
        }

        .video-wrapper:hover .fullscreen-btn-overlay {
            display: flex;
        }

        .fullscreen-btn-overlay svg {
            width: 20px;
            height: 20px;
        }

        /* Progress Bar */
        .progress-section {
            margin-top: 1rem;
            position: relative;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: var(--surface-2);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: visible;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            width: 0%;
            position: relative;
            transition: width 0.05s linear;
        }

        .progress-bar-container:hover .progress-bar-fill {
            height: 8px;
            margin-top: -1px;
        }

        /* AB Loop markers */
        .loop-marker {
            position: absolute;
            top: -4px;
            width: 3px;
            height: 14px;
            border-radius: 2px;
            z-index: 2;
        }
        .loop-marker.a { background: var(--teal); }
        .loop-marker.b { background: var(--pink); }

        .loop-region {
            position: absolute;
            top: 0;
            height: 100%;
            background: rgba(200, 162, 255, 0.12);
            border-radius: 3px;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        /* Controls */
        .controls {
            margin-top: 1.25rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.4rem;
        }

        .ctrl-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .ctrl-btn:hover {
            background: var(--surface-2);
        }

        .ctrl-btn.active {
            background: var(--accent-glow);
            color: var(--accent);
        }

        .ctrl-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Speed control */
        .speed-group {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.4rem 0.6rem;
        }

        .speed-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-right: 0.25rem;
        }

        .speed-btn {
            padding: 0.3rem 0.55rem;
            border: none;
            background: transparent;
            color: var(--text-dim);
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .speed-btn:hover { background: var(--surface-2); color: var(--text); }
        .speed-btn.active { background: var(--accent-glow); color: var(--accent); }

        .speed-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 0.25rem;
        }

        .speed-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 4px;
            background: var(--surface-2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        .speed-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .speed-input {
            width: 52px;
            padding: 0.2rem 0.3rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--accent);
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
            outline: none;
        }

        .speed-input:focus {
            border-color: var(--accent);
        }

        /* AB Loop Controls */
        .loop-group {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.4rem 0.6rem;
        }

        .loop-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .loop-btn {
            padding: 0.35rem 0.7rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 0.72rem;
            font-weight: 600;
            transition: all 0.2s;
            background: transparent;
            color: var(--text-dim);
        }

        .loop-btn:hover { background: var(--surface-2); color: var(--text); }
        .loop-btn.set-a { color: var(--teal); }
        .loop-btn.set-b { color: var(--pink); }
        .loop-btn.active-loop { background: var(--accent-glow); color: var(--accent); }
        .loop-btn.clear-loop { color: var(--text-dim); font-size: 0.85rem; }

        /* Upload new */
        .upload-new-btn {
            margin-left: auto;
            padding: 0.45rem 1rem;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-dim);
            border-radius: 10px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .upload-new-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Keyboard shortcuts hint */
        .shortcuts {
            margin-top: 1.5rem;
            padding: 1rem 1.25rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .shortcuts-title {
            font-family: 'Space Mono', monospace;
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .shortcuts-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.5rem;
        }

        .shortcut {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        kbd {
            display: inline-block;
            padding: 0.15rem 0.45rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--text);
            min-width: 24px;
            text-align: center;
        }

        /* Fullscreen styles */
        .video-wrapper:fullscreen,
        .video-wrapper:-webkit-full-screen {
            background: #000;
            border-radius: 0;
            border: none;
        }

        .video-wrapper:fullscreen video,
        .video-wrapper:-webkit-full-screen video {
            height: 100vh;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header { padding: 1rem; }
            .main { padding: 1rem; }
            .controls { gap: 0.5rem; }
            .shortcuts-grid { gap: 0.4rem 1rem; }
            .upload-new-btn { margin-left: 0; }
        }

        /* Drag & drop highlight */
        .video-wrapper.drag-over .upload-zone {
            background: var(--accent-glow);
            border-color: var(--accent);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <div class="logo-icon">💃</div>
        <div class="logo-text">dance<span>.tool</span></div>
    </div>
    <div class="header-hint">local playback · nothing uploaded</div>
</div>

<div class="main">
    <!-- Video Player -->
    <div class="video-wrapper" id="videoWrapper">
        <video id="video" playsinline></video>

        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">↑</div>
            <div class="upload-text"><strong>Drop video here</strong> or click to browse</div>
            <div class="upload-sub">MP4, MOV, WebM · stays on your device</div>
        </div>

        <div class="play-overlay" id="playOverlay">
            <div class="play-overlay-icon" id="playOverlayIcon">
                <!-- filled dynamically -->
            </div>
        </div>

        <button class="fullscreen-btn-overlay" id="fullscreenBtn" title="Fullscreen (F)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
            </svg>
        </button>

        <input type="file" id="fileInput" accept="video/*">
    </div>

    <!-- Progress -->
    <div class="progress-section" id="progressSection" style="display:none;">
        <div class="progress-bar-container" id="progressBar">
            <div class="loop-region" id="loopRegion" style="display:none;"></div>
            <div class="loop-marker a" id="markerA" style="display:none;"></div>
            <div class="loop-marker b" id="markerB" style="display:none;"></div>
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="time-display">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls" id="controlsSection" style="display:none;">
        <!-- Play/Pause & Skip -->
        <div class="control-group">
            <button class="ctrl-btn" id="skipBackBtn" title="Back 5s (←)">
                <svg viewBox="0 0 24 24"><path d="M11 19l-7-7 7-7"/><path d="M4 12h16"/></svg>
            </button>
            <button class="ctrl-btn" id="playBtn" title="Play/Pause (Space)">
                <svg viewBox="0 0 24 24" id="playIcon"><polygon points="5,3 19,12 5,21" fill="currentColor" stroke="none"/></svg>
            </button>
            <button class="ctrl-btn" id="skipFwdBtn" title="Forward 5s (→)">
                <svg viewBox="0 0 24 24"><path d="M13 5l7 7-7 7"/><path d="M20 12H4"/></svg>
            </button>
        </div>

        <!-- Mirror -->
        <div class="control-group">
            <button class="ctrl-btn" id="mirrorBtn" title="Mirror (M)">
                <svg viewBox="0 0 24 24"><path d="M8 3l4 4-4 4"/><path d="M12 7H3"/><path d="M16 3l-4 4 4 4"/><path d="M12 7h9"/><path d="M12 21V3" stroke-dasharray="2 2"/></svg>
            </button>
        </div>

        <!-- Speed -->
        <div class="speed-group">
            <span class="speed-label">Speed</span>
            <button class="speed-btn" data-speed="0.25">0.25</button>
            <button class="speed-btn" data-speed="0.5">0.5</button>
            <button class="speed-btn" data-speed="0.75">0.75</button>
            <button class="speed-btn active" data-speed="1">1x</button>
            <button class="speed-btn" data-speed="1.25">1.25</button>
            <button class="speed-btn" data-speed="1.5">1.5</button>
            <button class="speed-btn" data-speed="2">2x</button>
            <span class="speed-divider"></span>
            <input type="range" id="speedSlider" class="speed-slider" min="0.1" max="2" step="0.05" value="1">
            <input type="number" id="speedInput" class="speed-input" min="0.1" max="3" step="0.05" value="1">
        </div>

        <!-- AB Loop -->
        <div class="loop-group">
            <span class="loop-label">Loop</span>
            <button class="loop-btn set-a" id="setABtn" title="Set A point ([)">A</button>
            <button class="loop-btn set-b" id="setBBtn" title="Set B point (])">B</button>
            <button class="loop-btn active-loop" id="toggleLoopBtn" title="Toggle loop (L)" style="display:none;">⟳ On</button>
            <button class="loop-btn clear-loop" id="clearLoopBtn" title="Clear loop (C)" style="display:none;">✕</button>
        </div>

        <!-- Upload new -->
        <button class="upload-new-btn" id="uploadNewBtn">Change Video</button>
    </div>

    <!-- Keyboard Shortcuts -->
    <div class="shortcuts" id="shortcutsSection" style="display:none;">
        <div class="shortcuts-title">Keyboard Shortcuts</div>
        <div class="shortcuts-grid">
            <div class="shortcut"><kbd>Space</kbd> Play / Pause</div>
            <div class="shortcut"><kbd>M</kbd> Mirror</div>
            <div class="shortcut"><kbd>←</kbd><kbd>→</kbd> Skip 5s</div>
            <div class="shortcut"><kbd>F</kbd> Fullscreen</div>
            <div class="shortcut"><kbd>[</kbd> Set A point</div>
            <div class="shortcut"><kbd>]</kbd> Set B point</div>
            <div class="shortcut"><kbd>L</kbd> Toggle loop</div>
            <div class="shortcut"><kbd>C</kbd> Clear loop</div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const videoWrapper = document.getElementById('videoWrapper');
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const progressSection = document.getElementById('progressSection');
    const controlsSection = document.getElementById('controlsSection');
    const shortcutsSection = document.getElementById('shortcutsSection');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const playOverlay = document.getElementById('playOverlay');
    const playOverlayIcon = document.getElementById('playOverlayIcon');
    const mirrorBtn = document.getElementById('mirrorBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const setABtn = document.getElementById('setABtn');
    const setBBtn = document.getElementById('setBBtn');
    const toggleLoopBtn = document.getElementById('toggleLoopBtn');
    const clearLoopBtn = document.getElementById('clearLoopBtn');
    const markerA = document.getElementById('markerA');
    const markerB = document.getElementById('markerB');
    const loopRegion = document.getElementById('loopRegion');

    let loopA = null, loopB = null, loopActive = false;
    let overlayTimeout = null;

    const pauseSVG = '<rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor" stroke="none"/><rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor" stroke="none"/>';
    const playSVG = '<polygon points="5,3 19,12 5,21" fill="currentColor" stroke="none"/>';
    const overlayPlaySVG = '<svg viewBox="0 0 24 24" width="28" height="28"><polygon points="6,3 20,12 6,21" fill="white"/></svg>';
    const overlayPauseSVG = '<svg viewBox="0 0 24 24" width="28" height="28"><rect x="5" y="3" width="5" height="18" rx="1" fill="white"/><rect x="14" y="3" width="5" height="18" rx="1" fill="white"/></svg>';

    // -- File Upload --
    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) loadVideo(e.target.files[0]);
    });

    // Drag & drop
    videoWrapper.addEventListener('dragover', (e) => {
        e.preventDefault();
        videoWrapper.classList.add('drag-over');
    });
    videoWrapper.addEventListener('dragleave', () => videoWrapper.classList.remove('drag-over'));
    videoWrapper.addEventListener('drop', (e) => {
        e.preventDefault();
        videoWrapper.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('video/')) loadVideo(file);
    });

    function loadVideo(file) {
        const url = URL.createObjectURL(file);
        video.src = url;
        video.load();
        uploadZone.classList.add('hidden');
        progressSection.style.display = '';
        controlsSection.style.display = '';
        shortcutsSection.style.display = '';
    }

    document.getElementById('uploadNewBtn').addEventListener('click', () => fileInput.click());

    // -- Play / Pause --
    function togglePlay() {
        if (!video.src) return;
        if (video.paused) {
            video.play();
        } else {
            video.pause();
        }
    }

    video.addEventListener('play', updatePlayState);
    video.addEventListener('pause', updatePlayState);

    function updatePlayState() {
        const paused = video.paused;
        playIcon.innerHTML = paused ? playSVG : pauseSVG;

        // Show overlay briefly
        playOverlayIcon.innerHTML = paused ? overlayPlaySVG : overlayPauseSVG;
        playOverlay.classList.add('show');
        clearTimeout(overlayTimeout);
        overlayTimeout = setTimeout(() => playOverlay.classList.remove('show'), 400);
    }

    // Click video to play/pause
    videoWrapper.addEventListener('click', (e) => {
        if (e.target === uploadZone || uploadZone.contains(e.target)) return;
        if (e.target === fullscreenBtn || fullscreenBtn.contains(e.target)) return;
        togglePlay();
    });

    // Double click for fullscreen
    videoWrapper.addEventListener('dblclick', (e) => {
        if (e.target === uploadZone || uploadZone.contains(e.target)) return;
        toggleFullscreen();
    });

    playBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        togglePlay();
    });

    // -- Progress --
    video.addEventListener('timeupdate', () => {
        if (!video.duration) return;
        const pct = (video.currentTime / video.duration) * 100;
        progressFill.style.width = pct + '%';
        currentTimeEl.textContent = formatTime(video.currentTime);

        // AB Loop
        if (loopActive && loopA !== null && loopB !== null) {
            if (video.currentTime >= loopB) {
                video.currentTime = loopA;
            }
        }
    });

    video.addEventListener('loadedmetadata', () => {
        totalTimeEl.textContent = formatTime(video.duration);
    });

    progressBar.addEventListener('click', (e) => {
        if (!video.duration) return;
        const rect = progressBar.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        video.currentTime = pct * video.duration;
    });

    function formatTime(s) {
        if (isNaN(s)) return '0:00';
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return m + ':' + String(sec).padStart(2, '0');
    }

    // -- Mirror --
    mirrorBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        videoWrapper.classList.toggle('mirrored');
        mirrorBtn.classList.toggle('active');
    });

    // -- Speed --
    const speedSlider = document.getElementById('speedSlider');
    const speedInput = document.getElementById('speedInput');

    function setSpeed(val) {
        val = Math.max(0.1, Math.min(3, parseFloat(val) || 1));
        video.playbackRate = val;
        speedSlider.value = Math.min(val, 2);
        speedInput.value = val;
        // Highlight matching preset button
        document.querySelectorAll('.speed-btn').forEach(b => {
            b.classList.toggle('active', parseFloat(b.dataset.speed) === val);
        });
    }

    document.querySelectorAll('.speed-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            setSpeed(parseFloat(btn.dataset.speed));
        });
    });

    speedSlider.addEventListener('input', () => setSpeed(parseFloat(speedSlider.value)));
    speedInput.addEventListener('change', () => setSpeed(parseFloat(speedInput.value)));
    speedInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.target.blur(); setSpeed(parseFloat(speedInput.value)); }
    });

    // -- Fullscreen --
    function toggleFullscreen() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (videoWrapper.requestFullscreen) videoWrapper.requestFullscreen();
            else if (videoWrapper.webkitRequestFullscreen) videoWrapper.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    }

    fullscreenBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleFullscreen();
    });

    // -- AB Loop --
    setABtn.addEventListener('click', (e) => {
        e.stopPropagation();
        loopA = video.currentTime;
        setABtn.textContent = 'A: ' + formatTime(loopA);
        updateLoopUI();
    });

    setBBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        loopB = video.currentTime;
        if (loopA !== null && loopB <= loopA) {
            loopB = null;
            setBBtn.textContent = 'B';
            return;
        }
        setBBtn.textContent = 'B: ' + formatTime(loopB);
        if (loopA !== null) {
            loopActive = true;
        }
        updateLoopUI();
    });

    toggleLoopBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        loopActive = !loopActive;
        updateLoopUI();
    });

    clearLoopBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        loopA = null; loopB = null; loopActive = false;
        setABtn.textContent = 'A';
        setBBtn.textContent = 'B';
        updateLoopUI();
    });

    function updateLoopUI() {
        const hasLoop = loopA !== null && loopB !== null;
        toggleLoopBtn.style.display = hasLoop ? '' : 'none';
        clearLoopBtn.style.display = (loopA !== null || loopB !== null) ? '' : 'none';
        toggleLoopBtn.textContent = loopActive ? '⟳ On' : '⟳ Off';
        toggleLoopBtn.classList.toggle('active-loop', loopActive);

        if (loopA !== null && video.duration) {
            markerA.style.display = '';
            markerA.style.left = (loopA / video.duration * 100) + '%';
        } else {
            markerA.style.display = 'none';
        }

        if (loopB !== null && video.duration) {
            markerB.style.display = '';
            markerB.style.left = (loopB / video.duration * 100) + '%';
        } else {
            markerB.style.display = 'none';
        }

        if (hasLoop && video.duration) {
            loopRegion.style.display = '';
            loopRegion.style.left = (loopA / video.duration * 100) + '%';
            loopRegion.style.width = ((loopB - loopA) / video.duration * 100) + '%';
        } else {
            loopRegion.style.display = 'none';
        }
    }

    // -- Keyboard Shortcuts --
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        switch (e.code) {
            case 'Space':
                e.preventDefault();
                togglePlay();
                break;
            case 'ArrowLeft':
                e.preventDefault();
                video.currentTime = Math.max(0, video.currentTime - 5);
                break;
            case 'ArrowRight':
                e.preventDefault();
                video.currentTime = Math.min(video.duration, video.currentTime + 5);
                break;
            case 'KeyM':
                mirrorBtn.click();
                break;
            case 'KeyF':
                toggleFullscreen();
                break;
            case 'BracketLeft':
                setABtn.click();
                break;
            case 'BracketRight':
                setBBtn.click();
                break;
            case 'KeyL':
                if (loopA !== null && loopB !== null) toggleLoopBtn.click();
                break;
            case 'KeyC':
                clearLoopBtn.click();
                break;
        }
    });
</script>

</body>
</html>
